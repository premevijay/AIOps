# AIOps — Phase 1 connectivity spine.
#
# Brings up: the job bus (NATS), platform state DB (Postgres), CyberArk Conjur
# (+ its own Postgres) for the SecretProvider, and the connectivity worker.
#
# First run (no Conjur account yet) works out of the box with the env secret
# provider — set DEVICE_USERNAME / DEVICE_PASSWORD in .env. Switch to CyberArk by
# setting SECRET_PROVIDER=cyberark once Conjur is initialized (see
# services/worker/README.md).

services:
  bus:
    image: nats:2.10-alpine
    command: ["-js"]
    ports: ["4222:4222"]
    restart: unless-stopped

  state-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiops
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: ${STATE_DB_PASSWORD:-aiops}
    volumes: [state-db:/var/lib/postgresql/data]
    restart: unless-stopped

  conjur-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes: [conjur-db:/var/lib/postgresql/data]
    restart: unless-stopped

  conjur:
    image: cyberark/conjur:1.21
    command: server
    environment:
      DATABASE_URL: postgres://postgres@conjur-db/postgres
      CONJUR_DATA_KEY: ${CONJUR_DATA_KEY}     # generate once; see worker README
      CONJUR_ACCOUNT: ${CONJUR_ACCOUNT:-default}
    ports: ["8080:80"]
    depends_on: [conjur-db]
    restart: unless-stopped

  # CLI used by infra/conjur/bootstrap.sh; only runs via `docker compose run`
  # (tools profile => not started by `docker compose up`).
  conjur-cli:
    image: cyberark/conjur-cli:8
    profiles: ["tools"]
    depends_on: [conjur]
    volumes:
      - ./infra/conjur/policy:/policy:ro
    entrypoint: ["sleep", "infinity"]

  worker:
    build:
      context: .                       # repo root: image bakes in the ansible/ project
      dockerfile: services/worker/Dockerfile
    environment:
      NATS_URL: nats://bus:4222
      SECRET_PROVIDER: ${SECRET_PROVIDER:-env}
      # env provider (lab first-run)
      DEVICE_USERNAME: ${DEVICE_USERNAME:-}
      DEVICE_PASSWORD: ${DEVICE_PASSWORD:-}
      DEVICE_ENABLE: ${DEVICE_ENABLE:-}
      # cyberark provider
      CONJUR_URL: http://conjur:80
      CONJUR_ACCOUNT: ${CONJUR_ACCOUNT:-default}
      CONJUR_LOGIN: ${CONJUR_LOGIN:-host/aiops/aiops-worker}
      CONJUR_API_KEY: ${CONJUR_API_KEY:-}
      # shared key that gates `apply` writes (must match the change service)
      CHANGE_SIGNING_KEY: ${CHANGE_SIGNING_KEY:-}
      # direct firewall query path (firewall_query): verify the firewall's TLS
      # cert — set false for lab firewalls with self-signed certs.
      FIREWALL_VERIFY_TLS: ${FIREWALL_VERIFY_TLS:-true}
      # execution backend: local (ansible-runner) | awx
      EXECUTION_BACKEND: ${EXECUTION_BACKEND:-local}
      CONFIG_STORE: /data/configs
      ANSIBLE_PROJECT_DIR: /app/ansible
      AWX_URL: ${AWX_URL:-}
      AWX_TOKEN: ${AWX_TOKEN:-}
      AWX_TEMPLATES: ${AWX_TEMPLATES:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - configs:/data/configs          # git-versioned config store
    depends_on: [bus]
    restart: unless-stopped

  # NetOps Supervisor — the first agent. Routes intents to capability tools that
  # run jobs on the worker. Needs ANTHROPIC_API_KEY + ANTHROPIC_MODEL.
  supervisor:
    build: ./services/supervisor
    environment:
      NATS_URL: nats://bus:4222
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      CHANGE_URL: http://change:8089
      INVENTORY_PATH: /app/inventory.yaml
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports: ["8088:8088"]
    volumes:
      - ./config/inventory.example.yaml:/app/inventory.yaml:ro
    depends_on: [bus, worker, change]
    restart: unless-stopped

  # Change Management — the human-approval authority for device-mutating changes.
  # Issues the HMAC token the worker requires to run `apply`.
  change:
    build: ./services/change
    environment:
      NATS_URL: nats://bus:4222
      CHANGE_SIGNING_KEY: ${CHANGE_SIGNING_KEY:-}
      REQUIRE_CHANGE_WINDOW: ${REQUIRE_CHANGE_WINDOW:-false}
      # durable store: postgres (state-db) by default; set memory for ephemeral
      CHANGE_STORE: ${CHANGE_STORE:-postgres}
      CHANGE_DB_URL: postgresql://aiops:${STATE_DB_PASSWORD:-aiops}@state-db:5432/aiops
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports: ["8089:8089"]
    depends_on: [bus, worker, state-db]
    restart: unless-stopped

  # Results Store — subscribes to the worker's result fanout (aiops.results) and
  # persists every job outcome, serving the latest-per-device-per-op read API the
  # dashboard Compliance / Backup / Health views consume.
  results:
    build: ./services/results
    environment:
      NATS_URL: nats://bus:4222
      RESULTS_SUBJECT: ${RESULTS_SUBJECT:-aiops.results}
      # durable store: postgres (state-db) by default; set memory for ephemeral
      RESULTS_STORE: ${RESULTS_STORE:-postgres}
      RESULTS_DB_URL: postgresql://aiops:${STATE_DB_PASSWORD:-aiops}@state-db:5432/aiops
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports: ["8090:8090"]
    depends_on: [bus, worker, state-db]
    restart: unless-stopped

  # ---- Telemetry stack (monitoring capability — OFF Ansible) ---------------
  # Telegraf polls SNMP + runs synthetic probes -> Prometheus -> Grafana.
  telegraf:
    image: telegraf:1.32
    environment:
      SNMP_COMMUNITY: ${SNMP_COMMUNITY:-public}
    volumes:
      - ./telemetry/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./telemetry/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    depends_on: [telegraf]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./telemetry/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./telemetry/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus]
    restart: unless-stopped

  # AetherNetOps dashboard — embeds the Grafana panels in its Monitoring view.
  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_GRAFANA_URL: ${VITE_GRAFANA_URL:-http://localhost:3000}
    ports: ["8081:80"]            # 8080 is taken by conjur
    depends_on: [grafana, supervisor]
    restart: unless-stopped

volumes:
  state-db: {}
  conjur-db: {}
  configs: {}
  prometheus-data: {}
  grafana-data: {}
