name: CI

# Validates the platform on every push and produces dashboard screenshots you
# can download from the run's Artifacts (so a push can be "viewed" in GitHub).

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  # Unit tests for each Python service (no NATS / no DB required).
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [worker, change, results]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: python -m pytest tests/ -q

  # Static validation of the full compose stack.
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose config > /dev/null && echo "compose OK"

  # Typecheck + production build of the dashboard.
  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        working-directory: dashboard
        run: |
          npm install
          npm run build

  # Stand the core stack up, seed sample data, and screenshot every view.
  # The PNGs land in the run's Artifacts as "dashboard-screenshots".
  screenshots:
    runs-on: ubuntu-latest
    needs: [tests, dashboard-build]
    steps:
      - uses: actions/checkout@v4

      - name: Prepare CI env
        run: |
          cp .env.example .env
          # Placeholder secrets so the supervisor boots; no real API call is made
          # (the screenshots only hit read endpoints, never /intent).
          {
            echo "ANTHROPIC_API_KEY=ci-placeholder-not-a-real-key"
            echo "ANTHROPIC_MODEL=ci-placeholder-model"
            echo "CHANGE_SIGNING_KEY=ci-placeholder-signing-key"
          } >> .env

      - name: Build & start core stack
        run: |
          docker compose up -d --build --no-deps \
            bus state-db worker change results supervisor dashboard

      - name: Wait for services
        run: |
          set -e
          wait_for() {
            echo "waiting for $1"
            for i in $(seq 1 60); do
              if curl -fsS "$1" > /dev/null 2>&1; then echo "  up"; return 0; fi
              sleep 2
            done
            echo "  TIMEOUT $1"; return 1
          }
          wait_for http://localhost:8089/healthz
          wait_for http://localhost:8090/healthz
          wait_for http://localhost:8088/healthz
          wait_for http://localhost:8081/

      - name: Seed a sample change
        continue-on-error: true
        run: |
          curl -fsS http://localhost:8089/changes \
            -H 'content-type: application/json' \
            -d @.github/ci/sample-change.json && echo "" || echo "seed failed (non-fatal)"

      - name: Install Playwright
        working-directory: .github/ci
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Capture screenshots
        working-directory: .github/ci
        run: node screenshots.mjs

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshots
          path: .github/ci/shots/
          if-no-files-found: warn

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color | tail -n 400
