server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to the change service (no CORS). The trailing slash on
    # the proxy_pass target strips the /api/change/ prefix:
    #   /api/change/changes -> http://change:8089/changes
    location /api/change/ {
        proxy_pass http://change:8089/;
    }

    # SPA fallback: serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
