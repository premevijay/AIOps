server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to the change service (no CORS). The trailing slash on
    # the proxy_pass target strips the /api/change/ prefix:
    #   /api/change/changes -> http://change:8089/changes
    location /api/change/ {
        proxy_pass http://change:8089/;
    }

    # Same-origin proxy to the supervisor for the inventory read API:
    #   /api/agent/devices -> http://supervisor:8088/devices
    location /api/agent/ {
        proxy_pass http://supervisor:8088/;
    }

    # Same-origin proxy to the results store:
    #   /api/results/results/latest -> http://results:8090/results/latest
    location /api/results/ {
        proxy_pass http://results:8090/;
    }

    # SPA fallback: serve index.html for any unmatched route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
