# Prometheus — time-series store for the telemetry stack. Scrapes Telegraf's
# Prometheus endpoint (SNMP + synthetic metrics) and itself.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: telegraf
    static_configs:
      - targets: ["telegraf:9273"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
