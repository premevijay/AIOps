# Grafana config — tuned so panels can be embedded in the AetherNetOps dashboard.
[server]
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
# Required for the dashboard's <iframe> embeds (d-solo panels).
allow_embedding = true
cookie_samesite = none

[auth.anonymous]
# Let the embedded panels render without a Grafana login (Viewer = read-only).
# Lock this down (or use a signed embed) before exposing Grafana publicly.
enabled = true
org_role = Viewer

[users]
default_theme = dark
