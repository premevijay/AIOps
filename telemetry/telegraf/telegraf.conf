# Telegraf — the telemetry collector for the monitoring capability.
# This path is deliberately OFF Ansible: monitoring is continuous/streaming, not
# task-based. Telegraf polls SNMP + runs synthetic probes and exposes Prometheus
# metrics on :9273, which Prometheus scrapes.
#
# Add a device by copying an [[inputs.snmp]] agents entry (and ping/http targets)
# — keep these targets in sync with config/inventory.yaml.

[agent]
  interval = "30s"
  flush_interval = "30s"
  omit_hostname = true

# Expose metrics for Prometheus to scrape.
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2

# ---- SNMP polling (IF-MIB + system) --------------------------------------
[[inputs.snmp]]
  agents = ["udp://10.10.10.11:161"]    # cat9k-lab-01 mgmt IP
  version = 2
  community = "${SNMP_COMMUNITY}"
  timeout = "5s"
  retries = 2
  name = "snmp"

  [[inputs.snmp.field]]
    name = "sysName"
    oid = "1.3.6.1.2.1.1.5.0"
    is_tag = true
  [[inputs.snmp.field]]
    name = "uptime"
    oid = "1.3.6.1.2.1.1.3.0"

  [[inputs.snmp.table]]
    name = "interface"
    inherit_tags = ["sysName"]
    [[inputs.snmp.table.field]]
      name = "ifName"
      oid = "1.3.6.1.2.1.31.1.1.1.1"
      is_tag = true
    [[inputs.snmp.table.field]]
      name = "ifHCInOctets"
      oid = "1.3.6.1.2.1.31.1.1.1.6"
    [[inputs.snmp.table.field]]
      name = "ifHCOutOctets"
      oid = "1.3.6.1.2.1.31.1.1.1.10"
    [[inputs.snmp.table.field]]
      name = "ifOperStatus"
      oid = "1.3.6.1.2.1.2.2.1.8"

# ---- Synthetic monitoring -------------------------------------------------
# ICMP reachability (the "Reachability" Grafana panel).
[[inputs.ping]]
  urls = ["10.10.10.11"]
  count = 3
  timeout = 2.0

# HTTP/HTTPS probe against a device mgmt endpoint or service.
[[inputs.http_response]]
  urls = ["https://10.10.10.11"]
  insecure_skip_verify = true
  response_timeout = "5s"
