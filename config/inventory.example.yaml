# Sample inventory — one EVE-NG Cisco Catalyst (IOS-XE) lab device.
# Copy to config/inventory.yaml and point mgmt_host at your lab device.
#
# vault_path is where this device's credentials live in CyberArk Conjur:
#   <vault_path>/username, <vault_path>/password, <vault_path>/enable
# (ignored when SECRET_PROVIDER=env, which uses the shared DEVICE_* creds.)

devices:
  - name: cat9k-lab-01
    vendor: Cisco Catalyst
    os: ios
    type: switch
    mgmt_host: 10.10.10.11
    port: 22
    vault_path: aiops/lab/cat9k-lab-01

  # A Palo Alto firewall (VM-series in EVE-NG). os=panos selects the panos
  # connection vars and the PAN-OS playbook branches; the firewall agent owns
  # every device with type=firewall. Reached over the device's mgmt API.
  - name: pa-fw-lab-01
    vendor: Palo Alto
    os: panos
    type: firewall
    mgmt_host: 10.10.10.21
    port: 443
    vault_path: aiops/lab/pa-fw-lab-01
