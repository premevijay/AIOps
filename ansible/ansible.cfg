[defaults]
inventory = inventory/lab.yml
# Collections path comes from ANSIBLE_COLLECTIONS_PATH (absolute) — set by the
# worker (local_runner) and the Dockerfile, and exported for by-hand runs. A
# relative path here would resolve against the process CWD (the ansible-runner
# private data dir), not this project, and silently miss the collections.
host_key_checking = False
retry_files_enabled = False
gathering = explicit
stdout_callback = yaml
interpreter_python = auto_silent
# Device automation is task-based; keep facts opt-in per playbook.

[persistent_connection]
command_timeout = 60
connect_timeout = 60
