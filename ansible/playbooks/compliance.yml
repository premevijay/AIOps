# Compliance capability — assert a hardening baseline against the running config.
# Example CIS-flavored checks for IOS; extend with your golden policy + framework
# controls (CIS/PCI/NIST). A failed assert marks the device non-compliant.
#   ansible-playbook playbooks/compliance.yml -e target=cat9k-lab-01
- name: Compliance baseline
  hosts: "{{ target | default('network') }}"
  gather_facts: false
  tasks:
    - name: Pull running-config (Cisco IOS)
      when: ansible_network_os == 'cisco.ios.ios'
      cisco.ios.ios_command:
        commands: ['show running-config']
      register: _rc

    # Match whole config lines, not substrings: a hardened device renders
    # "no ip http server", which *contains* "ip http server" — a substring test
    # would wrongly fail it. cfg_lines is the running-config, one trimmed line each.
    - name: Assert hardening baseline (Cisco IOS)
      when: ansible_network_os == 'cisco.ios.ios'
      vars:
        cfg_lines: "{{ _rc.stdout_lines[0] | map('trim') | list }}"
      ansible.builtin.assert:
        that:
          - "'ip http server' not in cfg_lines"            # HTTP server disabled
          - "'ip http secure-server' not in cfg_lines"     # HTTPS server disabled
          - "cfg_lines | select('match', '^transport input .*telnet') | list | length == 0"  # no telnet
          - "'service password-encryption' in cfg_lines"   # password encryption on
          - "'aaa new-model' in cfg_lines"                 # AAA enabled
        fail_msg: "{{ inventory_hostname }} FAILS the hardening baseline"
        success_msg: "{{ inventory_hostname }} passes the hardening baseline"

    # ----- PAN-OS STARTER baseline -----------------------------------------
    # A minimal firewall-hygiene check: no "permit any any any allow" rule.
    # This is a STARTER baseline — extend it with your org's golden firewall
    # policy (zones, profiles, logging, App-ID/User-ID enforcement, etc.).
    - name: Gather security rules (PAN-OS)
      when: ansible_network_os == 'paloaltonetworks.panos.panos'
      paloaltonetworks.panos.panos_security_rule_facts:
        provider: "{{ panos_provider }}"
      register: _panos_rules

    - name: Assert firewall-hygiene baseline (PAN-OS)
      when: ansible_network_os == 'paloaltonetworks.panos.panos'
      vars:
        # Guard the iteration: default to an empty list so an empty/absent
        # ruleset evaluates cleanly instead of erroring.
        rules: "{{ _panos_rules.security_rules | default([]) }}"
        # A rule is "any-any-any allow" when every selector is 'any' and it
        # allows. PAN-OS renders these selectors as lists, so test membership.
        permit_any_rules: >-
          {{ rules | selectattr('source_ip', 'defined')
                   | selectattr('action', 'equalto', 'allow')
                   | selectattr('source_ip', 'contains', 'any')
                   | selectattr('destination_ip', 'contains', 'any')
                   | selectattr('application', 'contains', 'any')
                   | list }}
      ansible.builtin.assert:
        that:
          # No security rule that is source any AND destination any AND
          # application any AND action allow ("permit any any any allow").
          - "permit_any_rules | length == 0"
        fail_msg: >-
          {{ inventory_hostname }} FAILS the firewall-hygiene baseline:
          {{ permit_any_rules | map(attribute='rule_name') | list }} permit any/any/any
        success_msg: "{{ inventory_hostname }} passes the firewall-hygiene baseline"
